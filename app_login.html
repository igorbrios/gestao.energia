<!DOCTYPE html>
<!--
  app_login.html
  O que faz: Tela de login com PIN. Ponto de entrada do app.
  Depende de: api/api_auth.php, api/config.php
  Usado por: todos os módulos redirecionam para cá quando sem sessão
  Versão: 1.0 · Mai/2026
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d2018">
<title>Florescer · Entrar</title>
<link rel="manifest" href="../manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN SYSTEM — fiel ao prototipo_final
   ============================================================ */
:root {
  --v1: #0d2018;
  --v2: #1a3d2b;
  --v3: #2d6b45;
  --v4: #4caf70;
  --v5: #86d4a0;
  --vg: #c8ecd4;
  --vp: #e8f5ec;
  --am: #c87c2a;
  --amc: #fef3e6;
  --al: #b03020;
  --alc: #fdecea;
  --br: #fdfcf8;
  --ar: #f4f0e8;
  --ck: #e8e2d8;
  --pr: #1a1f1c;
  --cz: #5a6860;
  --czl: #c8d8cc;
}

* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--v1);
  color: var(--vg);
  overflow: hidden;
}

/* ============================================================
   SHELL DO TELEFONE (igual ao protótipo — desktop preview)
   Em celular real, ocupa 100% da tela
   ============================================================ */
.shell {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--v1);
}

/* Fundo com textura orgânica sutil */
.shell::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(45,107,69,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(13,32,24,0.9) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   TOPO — branding
   ============================================================ */
.topo {
  flex-shrink: 0;
  padding: 56px 32px 0;
  position: relative;
  z-index: 1;
}

.topo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(200,236,212,0.35);
  margin-bottom: 12px;
}

.topo-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  color: var(--vg);
  line-height: 0.95;
  letter-spacing: -0.02em;
}

.topo-titulo em {
  font-style: italic;
  color: var(--v4);
}

.topo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(200,236,212,0.28);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 10px;
}

/* Linha decorativa */
.topo-linha {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, var(--v4), transparent);
  margin: 20px 0 0;
  border-radius: 1px;
}

/* ============================================================
   ÁREA CENTRAL — PIN display + teclado
   ============================================================ */
.centro {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
  padding: 0 32px;
  gap: 32px;
}

/* --- Display do PIN --- */
.pin-display {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  height: 20px;
}

.pin-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1.5px solid rgba(200,236,212,0.25);
  background: transparent;
  transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.pin-dot.preenchido {
  background: var(--v4);
  border-color: var(--v4);
  transform: scale(1.1);
  box-shadow: 0 0 10px rgba(76,175,112,0.4);
}

.pin-dot.erro {
  background: var(--al);
  border-color: var(--al);
  animation: treme 0.35s ease;
}

@keyframes treme {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}

/* Mensagem de erro */
.pin-erro-msg {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--al);
  letter-spacing: 0.06em;
  text-align: center;
  height: 16px;
  opacity: 0;
  transition: opacity 0.2s;
}

.pin-erro-msg.vis { opacity: 1; }

/* --- Teclado numérico --- */
.teclado {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  grid-template-rows: repeat(4, 72px);
  gap: 10px;
}

.tecla {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: all 0.12s;
  gap: 1px;
  -webkit-tap-highlight-color: transparent;
}

.tecla:active,
.tecla.pressionada {
  background: rgba(76,175,112,0.15);
  border-color: rgba(76,175,112,0.3);
  transform: scale(0.93);
}

.tecla-num {
  font-family: 'DM Sans', sans-serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--vg);
  line-height: 1;
}

.tecla-abc {
  font-family: 'DM Mono', monospace;
  font-size: 7px;
  color: rgba(200,236,212,0.22);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Tecla vazia (espaçador) */
.tecla.vazia {
  background: transparent;
  border: none;
  cursor: default;
}
.tecla.vazia:active { transform: none; }

/* Tecla apagar */
.tecla.apagar {
  background: rgba(255,255,255,0.03);
  border-color: rgba(255,255,255,0.05);
}

.tecla-ico {
  font-size: 20px;
  color: rgba(200,236,212,0.4);
}

/* Tecla confirmar (aparece quando PIN está completo) */
.tecla.confirmar {
  background: var(--v3);
  border-color: var(--v4);
}

.tecla.confirmar .tecla-ico { color: var(--vg); font-size: 22px; }
.tecla.confirmar:active { background: var(--v4); }

/* ============================================================
   RODAPÉ
   ============================================================ */
.rodape {
  flex-shrink: 0;
  padding: 0 32px 40px;
  position: relative;
  z-index: 1;
  text-align: center;
}

.rodape-versao {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(200,236,212,0.15);
  letter-spacing: 0.1em;
}

/* ============================================================
   ESTADO DE CARREGAMENTO (enquanto autentica)
   ============================================================ */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--v1);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.loading-overlay.vis {
  opacity: 1;
  pointer-events: all;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 2px solid rgba(76,175,112,0.15);
  border-top-color: var(--v4);
  border-radius: 50%;
  animation: gira 0.8s linear infinite;
}

@keyframes gira {
  to { transform: rotate(360deg); }
}

.loading-txt {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(200,236,212,0.35);
  letter-spacing: 0.1em;
}

/* ============================================================
   TOAST — notificação sutil no topo
   ============================================================ */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--v2);
  border: 1px solid rgba(76,175,112,0.2);
  border-radius: 24px;
  padding: 8px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--vg);
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}

.toast.vis { transform: translateX(-50%) translateY(0); }

/* ============================================================
   OFFLINE BANNER
   ============================================================ */
.offline-banner {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(200,124,42,0.9);
  backdrop-filter: blur(8px);
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: white;
  text-align: center;
  letter-spacing: 0.06em;
  z-index: 150;
  transform: translateY(100%);
  transition: transform 0.3s;
}
.offline-banner.vis { transform: translateY(0); }

/* ============================================================
   ANIMAÇÃO DE ENTRADA
   ============================================================ */
.topo { animation: entrada-topo 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
.centro { animation: entrada-centro 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both; }

@keyframes entrada-topo {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes entrada-centro {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="shell">

  <!-- TOPO -->
  <div class="topo">
    <div class="topo-tag">Viveiro · Energisa MS</div>
    <div class="topo-titulo">Flores<em>cer</em></div>
    <div class="topo-sub">Campo Grande · MS</div>
    <div class="topo-linha"></div>
  </div>

  <!-- CENTRO: PIN + TECLADO -->
  <div class="centro">

    <!-- Display dos dígitos -->
    <div>
      <div class="pin-display" id="pinDisplay">
        <div class="pin-dot" data-pos="0"></div>
        <div class="pin-dot" data-pos="1"></div>
        <div class="pin-dot" data-pos="2"></div>
        <div class="pin-dot" data-pos="3"></div>
        <div class="pin-dot" data-pos="4"></div>
        <div class="pin-dot" data-pos="5"></div>
      </div>
      <div class="pin-erro-msg" id="erroMsg">PIN incorreto</div>
    </div>

    <!-- Teclado -->
    <div class="teclado" id="teclado">
      <!-- Linha 1 -->
      <div class="tecla" data-n="1"><span class="tecla-num">1</span></div>
      <div class="tecla" data-n="2"><span class="tecla-num">2</span><span class="tecla-abc">abc</span></div>
      <div class="tecla" data-n="3"><span class="tecla-num">3</span><span class="tecla-abc">def</span></div>
      <!-- Linha 2 -->
      <div class="tecla" data-n="4"><span class="tecla-num">4</span><span class="tecla-abc">ghi</span></div>
      <div class="tecla" data-n="5"><span class="tecla-num">5</span><span class="tecla-abc">jkl</span></div>
      <div class="tecla" data-n="6"><span class="tecla-num">6</span><span class="tecla-abc">mno</span></div>
      <!-- Linha 3 -->
      <div class="tecla" data-n="7"><span class="tecla-num">7</span><span class="tecla-abc">pqrs</span></div>
      <div class="tecla" data-n="8"><span class="tecla-num">8</span><span class="tecla-abc">tuv</span></div>
      <div class="tecla" data-n="9"><span class="tecla-num">9</span><span class="tecla-abc">wxyz</span></div>
      <!-- Linha 4 -->
      <div class="tecla vazia"></div>
      <div class="tecla" data-n="0"><span class="tecla-num">0</span></div>
      <div class="tecla apagar" id="teclaApagar"><span class="tecla-ico">⌫</span></div>
    </div>

  </div>

  <!-- RODAPÉ -->
  <div class="rodape">
    <div class="rodape-versao">Florescer v1.0 · M1</div>
  </div>

</div><!-- fim shell -->

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-txt">Entrando...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- OFFLINE -->
<div class="offline-banner" id="offlineBanner">
  📴 Sem conexão — verificando sessão local
</div>

<script>
// ============================================================
// ESTADO
// ============================================================
const ESTADO = {
  pin: [],
  maxDigitos: 6,
  bloqueado: false,    // bloqueia input durante requisição
  tentativas: 0,
};

// ============================================================
// VERIFICAR SESSÃO EXISTENTE
// Ao carregar, verifica se já há sessão válida
// ============================================================
(async function verificarSessao() {
  const token = localStorage.getItem('vf_token');
  if (!token) return; // sem token, fica na tela de login

  mostrarLoading('Verificando sessão...');

  try {
    const resp = await chamarAPI('verificar', {});
    if (resp.ok) {
      // Tem sessão válida — salva usuário e vai para o app
      localStorage.setItem('vf_usuario', JSON.stringify(resp.dados.usuario));
      irParaApp(resp.dados.usuario);
    }
  } catch (e) {
    // Sem conexão ou erro — fica no login
  } finally {
    esconderLoading();
  }
})();

// ============================================================
// DETECTAR OFFLINE
// ============================================================
function atualizarOffline() {
  document.getElementById('offlineBanner').classList.toggle('vis', !navigator.onLine);
}
window.addEventListener('online',  atualizarOffline);
window.addEventListener('offline', atualizarOffline);
atualizarOffline();

// ============================================================
// TECLADO — eventos de toque e clique
// ============================================================
document.getElementById('teclado').addEventListener('click', function(e) {
  const tecla = e.target.closest('.tecla');
  if (!tecla || tecla.classList.contains('vazia') || ESTADO.bloqueado) return;

  // Efeito visual de pressão
  tecla.classList.add('pressionada');
  setTimeout(() => tecla.classList.remove('pressionada'), 100);

  if (tecla.id === 'teclaApagar') {
    apagar();
  } else if (tecla.dataset.n !== undefined) {
    adicionarDigito(tecla.dataset.n);
  }
});

// Teclado físico (desktop / testes)
document.addEventListener('keydown', function(e) {
  if (ESTADO.bloqueado) return;
  if (e.key >= '0' && e.key <= '9') adicionarDigito(e.key);
  if (e.key === 'Backspace') apagar();
  if (e.key === 'Enter' && ESTADO.pin.length >= 4) enviarLogin();
});

// ============================================================
// LÓGICA DO PIN
// ============================================================
function adicionarDigito(d) {
  if (ESTADO.pin.length >= ESTADO.maxDigitos) return;
  ESTADO.pin.push(d);
  atualizarDisplay();

  // Auto-submete quando atinge 6 dígitos
  if (ESTADO.pin.length === ESTADO.maxDigitos) {
    setTimeout(enviarLogin, 150);
  }
}

function apagar() {
  if (ESTADO.pin.length === 0) return;
  ESTADO.pin.pop();
  atualizarDisplay();
  limparErro();
}

function atualizarDisplay() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((dot, i) => {
    dot.classList.toggle('preenchido', i < ESTADO.pin.length);
    dot.classList.remove('erro');
  });
}

function mostrarErroDisplay() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach(dot => {
    if (dot.classList.contains('preenchido')) {
      dot.classList.add('erro');
    }
  });
}

function limparErro() {
  document.getElementById('erroMsg').classList.remove('vis');
  document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('erro'));
}

// ============================================================
// LOGIN
// ============================================================
async function enviarLogin() {
  if (ESTADO.pin.length < 4) return;
  if (ESTADO.bloqueado) return;

  ESTADO.bloqueado = true;
  mostrarLoading('Entrando...');

  const pinStr = ESTADO.pin.join('');

  try {
    const resp = await chamarAPI('login', { pin: pinStr });

    if (resp.ok) {
      // Guarda token e usuário
      localStorage.setItem('vf_token', resp.dados.token);
      localStorage.setItem('vf_usuario', JSON.stringify(resp.dados.usuario));

      mostrarToast('✓ Bem-vindo, ' + (resp.dados.usuario.apelido || resp.dados.usuario.nome));

      setTimeout(() => irParaApp(resp.dados.usuario), 600);
    } else {
      ESTADO.tentativas++;
      mostrarErroLogin(resp.erro || 'PIN incorreto');
    }
  } catch (e) {
    mostrarErroLogin('Sem conexão com o servidor');
  } finally {
    ESTADO.bloqueado = false;
    esconderLoading();
  }
}

function mostrarErroLogin(msg) {
  // Vibração háptica (celular)
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

  mostrarErroDisplay();
  const erroEl = document.getElementById('erroMsg');
  erroEl.textContent = msg;
  erroEl.classList.add('vis');

  // Limpa PIN após 800ms
  setTimeout(() => {
    ESTADO.pin = [];
    atualizarDisplay();
    limparErro();
  }, 800);
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
function irParaApp(usuario) {
  // Redireciona baseado no nível
  // Por agora vai para app_ponto.html (M2 — próximo módulo)
  // Quando M2 existir, muda para: window.location.href = '../app/app_ponto.html';
  const destino = usuario.nivel >= 4
    ? '../app/app_mapa.html'    // gestor vai direto para o mapa
    : '../app/app_ponto.html';  // funcionário vai para o ponto

  window.location.href = destino;
}

// ============================================================
// API
// ============================================================
async function chamarAPI(acao, dados) {
  const token = localStorage.getItem('vf_token');

  const headers = {
    'Content-Type': 'application/json',
  };
  if (token) headers['X-VF-TOKEN'] = token;

  const resp = await fetch('../api/api_auth.php', {
    method: 'POST',
    credentials: 'include',    // envia cookie se houver
    headers,
    body: JSON.stringify({ acao, ...dados }),
  });

  if (!resp.ok && resp.status !== 401) {
    throw new Error('Servidor retornou ' + resp.status);
  }

  return resp.json();
}

// ============================================================
// UTILITÁRIOS DE UI
// ============================================================
function mostrarLoading(txt = 'Aguarde...') {
  const el = document.getElementById('loadingOverlay');
  el.querySelector('.loading-txt').textContent = txt;
  el.classList.add('vis');
}

function esconderLoading() {
  document.getElementById('loadingOverlay').classList.remove('vis');
}

let toastTimer;
function mostrarToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('vis');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('vis'), 2500);
}
</script>
</body>
</html>
