<!DOCTYPE html>
<!--
  app_lotes.html  (v5)
  CORRIGIDO: nome_exibicao substitui nome_popular (fix 'undefined')
  CORRIGIDO: menu inferior correto em todas as telas
  NOVO: câmera opcional em visitas e registros de perda
  Versão: 5.0 · Mai/2026
-->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3d2b">
<title>Florescer · Lotes</title>
<link rel="manifest" href="../manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --v2:#1a3d2b;--v3:#2d6b45;--v4:#4caf70;--v5:#86d4a0;
  --vg:#c8ecd4;--vp:#e8f5ec;--am:#c87c2a;--amc:#fef3e6;
  --al:#b03020;--alc:#fdecea;--az:#2a5080;--azc:#e8f0fa;
  --br:#fdfcf8;--ar:#f4f0e8;--ck:#e8e2d8;--pr:#1a1f1c;
  --cz:#5a6860;--czl:#c8d8cc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--ar);color:var(--pr);overflow:hidden;}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--ar);}
.statusbar{background:var(--v2);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sb-left{display:flex;align-items:center;gap:8px;}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:rgba(76,175,112,.3);display:flex;align-items:center;justify-content:center;font-size:13px;}
.sb-user{font-family:'DM Mono',monospace;font-size:11px;color:var(--vg);}
.sb-nivel{font-family:'DM Mono',monospace;font-size:8px;color:rgba(200,236,212,.4);}
.sb-right{display:flex;align-items:center;gap:8px;}
.sb-hora{font-family:'DM Mono',monospace;font-size:12px;color:rgba(200,236,212,.5);}
.sb-sair{background:rgba(176,48,32,.25);border:1px solid rgba(176,48,32,.4);border-radius:6px;padding:3px 8px;font-family:'DM Mono',monospace;font-size:9px;color:#ffb0a0;cursor:pointer;}
.tophead{background:var(--v2);padding:0 16px 14px;flex-shrink:0;}
.tophead h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--vg);}
.tophead-sub{font-family:'DM Mono',monospace;font-size:9px;color:rgba(200,236,212,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.kpi-row{background:var(--v2);padding:0 14px 12px;display:flex;gap:7px;flex-shrink:0;}
.kpi{flex:1;background:rgba(255,255,255,.07);border-radius:9px;padding:7px 8px;text-align:center;}
.kpi-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--v4);line-height:1;}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:7px;color:rgba(200,236,212,.4);letter-spacing:.06em;margin-top:1px;}
.kpi.vazio .kpi-num{color:rgba(180,180,180,.7);}
.kpi.urgente .kpi-num{color:#ff7a6a;}
.kpi.atencao .kpi-num{color:var(--am);}
.filtro-bar{display:flex;gap:5px;padding:8px 14px;background:var(--v2);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filtro-bar::-webkit-scrollbar{display:none;}
.ftag{font-family:'DM Mono',monospace;font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);color:rgba(200,236,212,.5);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.ftag.on{background:rgba(76,175,112,.2);border-color:var(--v4);color:var(--v5);}
.ftag.on.vazios{background:rgba(180,180,180,.15);border-color:rgba(180,180,180,.4);color:rgba(220,220,220,.8);}
.ftag.on.urgente{background:rgba(176,48,32,.25);border-color:var(--al);color:#ffb0a0;}
.content{flex:1;overflow-y:auto;scrollbar-width:none;padding:8px 14px 80px;}
.content::-webkit-scrollbar{display:none;}
.bottom-nav{background:var(--br);border-top:1px solid var(--czl);display:flex;padding:6px 0 20px;flex-shrink:0;}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;text-decoration:none;}
.nav-ico{font-size:20px;line-height:1;}
.nav-lbl{font-size:9px;color:var(--cz);font-family:'DM Mono',monospace;letter-spacing:.04em;}
.nav-i.on .nav-lbl{color:var(--v3);}
.lote-card{background:var(--br);border-radius:12px;border:1px solid var(--czl);margin-bottom:7px;cursor:pointer;overflow:hidden;transition:box-shadow .15s;}
.lote-card:active{box-shadow:0 4px 16px rgba(0,0,0,.1);}
.lote-card-inner{display:flex;}
.lote-barra{width:4px;flex-shrink:0;}
.st-vazio .lote-barra{background:rgba(180,180,180,.5);}
.st-ativo .lote-barra{background:var(--v4);}
.st-urgente .lote-barra{background:var(--al);animation:pb 1.5s infinite;}
.st-agua .lote-barra{background:var(--az);}
.st-pronto .lote-barra{background:var(--am);}
.st-rust .lote-barra{background:#d4a030;}
@keyframes pb{0%,100%{opacity:1}50%{opacity:.3}}
.lote-body{flex:1;padding:10px 12px 8px;}
.lote-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;}
.lote-esp{font-size:14px;font-weight:600;color:var(--pr);flex:1;line-height:1.2;}
.lote-qtd{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--v3);line-height:1;text-align:right;}
.lote-qtd-sub{font-family:'DM Mono',monospace;font-size:7px;color:var(--cz);text-align:right;}
.lote-tags{display:flex;gap:4px;flex-wrap:wrap;}
.ltag{font-family:'DM Mono',monospace;font-size:8px;padding:2px 6px;border-radius:4px;}
.ltag.verde{background:var(--vp);color:var(--v3);}
.ltag.am{background:var(--amc);color:var(--am);}
.ltag.az{background:var(--azc);color:var(--az);}
.ltag.ck{background:var(--ck);color:var(--cz);}
.ltag.vazio-tag{background:rgba(180,180,180,.15);color:rgba(100,100,100,.8);}
.lote-origem{font-size:10px;color:var(--cz);padding:5px 12px 7px;border-top:1px solid var(--czl);}
/* Foto prévia */
.foto-preview{width:100%;height:80px;object-fit:cover;border-radius:7px;margin-top:6px;cursor:pointer;}
/* Botão câmera */
.btn-camera{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--ar);border:1.5px solid var(--czl);border-radius:8px;cursor:pointer;font-size:12px;color:var(--cz);width:100%;margin-bottom:8px;}
.btn-camera:active{background:var(--vp);}
.btn-camera.com-foto{border-color:var(--v4);color:var(--v3);background:var(--vp);}
.loading{text-align:center;padding:40px;color:var(--cz);font-family:'DM Mono',monospace;font-size:11px;}
/* Modais */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-ov.vis{opacity:1;pointer-events:all;}
.modal-box{background:var(--br);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);scrollbar-width:none;}
.modal-box::-webkit-scrollbar{display:none;}
.modal-ov.vis .modal-box{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--czl);border-radius:2px;margin:14px auto 0;}
.modal-acao-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:flex;align-items:flex-end;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-acao-ov.vis{opacity:1;pointer-events:all;}
.modal-acao-box{background:var(--br);border-radius:20px 20px 0 0;width:100%;padding:14px 18px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);max-height:88vh;overflow-y:auto;scrollbar-width:none;}
.modal-acao-box::-webkit-scrollbar{display:none;}
.modal-acao-ov.vis .modal-acao-box{transform:translateY(0);}
.acao-titulo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--v2);margin-bottom:12px;}
.campo{margin-bottom:9px;}
.campo label{display:block;font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--cz);margin-bottom:4px;}
.campo input,.campo select,.campo textarea{width:100%;background:var(--ar);border:1.5px solid var(--czl);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--pr);outline:none;}
.campo input:focus,.campo select:focus{border-color:var(--v3);}
.campo textarea{resize:none;height:60px;}
.btn-salvar{width:100%;padding:12px;background:var(--v2);color:var(--vg);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-salvar:active{background:var(--v3);}
.acao-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.btn-acao{padding:12px 8px;border-radius:12px;border:1.5px solid var(--czl);background:var(--ar);cursor:pointer;text-align:center;transition:all .15s;}
.btn-acao:active{transform:scale(.96);}
.btn-acao.primario{background:var(--v2);border-color:var(--v3);}
.btn-acao.plantar{background:#fff8e6;border-color:var(--am);}
.btn-acao.bloqueado{opacity:.4;cursor:not-allowed;}
.btn-acao-ico{font-size:20px;display:block;margin-bottom:3px;}
.btn-acao-lbl{font-size:11px;font-weight:500;color:var(--pr);}
.btn-acao.primario .btn-acao-lbl{color:var(--vg);}
.btn-acao.plantar .btn-acao-lbl{color:var(--am);}
.modal-tabs{display:flex;border-bottom:1px solid var(--czl);padding:0 18px;margin-top:10px;overflow-x:auto;scrollbar-width:none;}
.modal-tabs::-webkit-scrollbar{display:none;}
.mtab{font-family:'DM Mono',monospace;font-size:10px;padding:8px 0;margin-right:16px;color:var(--cz);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.mtab.on{color:var(--v3);border-bottom-color:var(--v3);}
.modal-content{padding:12px 18px 32px;}
.tab-panel{display:none;}
.tab-panel.vis{display:block;}
.estado-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.estado-btn{padding:12px 8px;border-radius:10px;border:1.5px solid var(--czl);background:var(--ar);cursor:pointer;text-align:center;transition:all .15s;}
.estado-btn.sel.muito_bem{background:var(--vp);border-color:var(--v4);}
.estado-btn.sel.atencao{background:var(--amc);border-color:var(--am);}
.estado-btn.sel.problema{background:var(--alc);border-color:var(--al);}
.estado-btn.sel.ok{background:var(--ar);border-color:var(--cz);}
.estado-ico{font-size:22px;display:block;margin-bottom:4px;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--v2);border:1px solid rgba(76,175,112,.2);border-radius:24px;padding:8px 18px;font-family:'DM Mono',monospace;font-size:11px;color:var(--vg);z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;}
.toast.vis{transform:translateX(-50%) translateY(0);}
/* Foto de lote no modal */
.lote-foto{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <div class="statusbar">

      <div class="sb-avatar" id="sbAvatar">🌱</div>
      <div>
        <div class="sb-user" id="sbNome">--</div>
        <div class="sb-nivel" id="sbNivel">Nível --</div>
      </div>
    </div>
    <div class="sb-right">
      <div class="sb-hora" id="sbHora">--:--</div>
      <div class="sb-sair" onclick="logout()">Sair</div>
    </div>
  </div>
  <div class="tophead">
    <h1>Lotes</h1>
    <div class="tophead-sub" id="subtitulo">Carregando...</div>

    <div class="kpi"><div class="kpi-num" id="kpiTotal">—</div><div class="kpi-lbl">Ativos</div></div>

    <a class="nav-i" id="navGes" href="#" onclick="navegar('app_gestor.html')" style="display:none"><span class="nav-ico">🎯</span><span class="nav-lbl">Gestão</span></a>
  </div>
</div>

  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modalLoteConteudo"></div>

</div>

<!-- MODAL AÇÃO -->
<!-- FAB criar -->
<button id="fabCriar" onclick="abrirMenuCriar()"
  style="position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--v3);border:none;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;z-index:30;color:white">＋</button>

<div class="modal-acao-ov" id="modalAcao" onclick="fecharModal('modalAcao',event)">
  <div class="modal-acao-box" onclick="event.stopPropagation()" id="modalAcaoBox"></div>
</div>

<input type="file" id="inputCamTaxa" accept="image/*" capture="environment" style="display:none">
<div class="toast" id="toast"></div>
<!-- Input câmera oculto -->
<input type="file" id="inputCamera" accept="image/*" capture="environment" style="display:none">

<script>
const APP={usuario:null,lotes:[],filtroStatus:'',filtroTipo:'',loteAtual:null,estadoVisita:null,visitaAtual:null,especies:[],fotoAtual:null,_taxaFoto:null};

// Handler câmera taxa
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('inputCamTaxa')?.addEventListener('change',function(){
    const file=this.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      APP._taxaFoto=e.target.result;
      const btn=document.getElementById('btnFotoTaxa');
      if(btn){btn.textContent='✓ Foto tirada';btn.style.borderStyle='solid';btn.style.borderColor='var(--v4)';}
      const prev=document.getElementById('fotoTaxaPrev');
      if(prev) prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:60px;object-fit:cover;border-radius:7px;margin-top:6px">`;
    };
    r.readAsDataURL(file); this.value='';
  });
});

const FASES_LABEL={vazio:'Vazio',semeadura:'Semeadura',germinacao:'Germinação',crescimento_tubete:'Crescim. tubete',crescimento_saco:'Crescim. saco',rustificacao:'Rustificação',expedicao:'Expedição'};
const STATUS_LBL={vazio:'Vazio',ativo:'Ativo',urgente:'Urgente',aguardando_agua:'Sem água',pronto:'Pronto',rustificando:'Rustificando',expedido:'Expedido'};
const nomesNivel={1:'Iniciante',2:'Operacional',3:'Técnico',4:'Gestor',5:'Gestor'};

(async function init(){
  try{
    const r=await api('api_auth.php',{acao:'verificar'});
    if(!r.ok){window.location.href='app_login.html';return;}
    APP.usuario=r.dados.usuario;
    localStorage.setItem('vf_usuario',JSON.stringify(APP.usuario));
  }catch(e){
    const u=localStorage.getItem('vf_usuario');
    if(!u){window.location.href='app_login.html';return;}
    APP.usuario=JSON.parse(u);
  }
  document.getElementById('sbAvatar').textContent=APP.usuario.avatar_emoji||'🌱';
  document.getElementById('sbNome').textContent=APP.usuario.apelido||APP.usuario.nome;
  document.getElementById('sbNivel').textContent=`Nível ${APP.usuario.nivel} · ${nomesNivel[APP.usuario.nivel]||''}`;
  atualizarHora(); setInterval(atualizarHora,30000);
  const nivel=parseInt(APP.usuario.nivel);
  if(nivel>=4){document.getElementById('navRel').style.display='flex';document.getElementById('navGes').style.display='flex';}
  await Promise.all([carregarDashboard(),carregarLotes(),carregarEspecies()]);
  const params=new URLSearchParams(location.search);
  if(params.get('lote_id')) abrirLote(parseInt(params.get('lote_id')));
})();

function atualizarHora(){document.getElementById('sbHora').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

async function carregarDashboard(){
  try{const r=await api('api_lotes.php',{acao:'dashboard'});
    if(!r.ok)return;
    document.getElementById('kpiTotal').textContent=r.dados.total_lotes_ativos||'0';
    document.getElementById('kpiVazios').textContent=r.dados.lotes_vazios||'0';
    document.getElementById('kpiUrgentes').textContent=r.dados.urgentes||'0';
    document.getElementById('kpiAtencao').textContent=r.dados.em_atencao||'0';
  }catch(e){}
}

async function carregarEspecies(){
  try{const r=await api('api_especies.php',{acao:'listar_especies'});
    if(r.ok) APP.especies=r.dados.especies||[];
  }catch(e){}
}

async function carregarLotes(){
  try{
    const body={acao:'listar'};
    if(APP.filtroStatus) body.status=APP.filtroStatus;
    if(APP.filtroTipo)   body.tipo_lote=APP.filtroTipo;
    const r=await api('api_lotes.php',body);
    if(!r.ok) throw new Error(r.erro);
    APP.lotes=r.dados.lotes;
    document.getElementById('subtitulo').textContent=`${APP.lotes.length} lote${APP.lotes.length!==1?'s':''} encontrado${APP.lotes.length!==1?'s':''}`;
    renderLotes();
  }catch(e){document.getElementById('conteudo').innerHTML=`<div class="loading">Erro: ${e.message}</div>`;}
}

function filtrar(el,status,tipo){
  document.querySelectorAll('.ftag').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  APP.filtroStatus=status==='vazio'?'':status;
  APP.filtroTipo=tipo;
  carregarLotes();
}

function renderLotes(){
  if(!APP.lotes.length){document.getElementById('conteudo').innerHTML='<div class="loading">Nenhum lote encontrado.</div>';return;}
  document.getElementById('conteudo').innerHTML=APP.lotes.map(l=>{
    const isVazio=l.tipo_lote==='vazio';
    // FIX: usa nome_exibicao retornado pela API (COALESCE no SQL)
    const nome=l.nome_exibicao||(isVazio?'Saquinho Novo':l.codigo);
    const stCss=`st-${l.status==='aguardando_agua'?'agua':l.status==='rustificando'?'rust':l.status}`;
    const tags=[
      isVazio?`<span class="ltag vazio-tag">Pronto p/ plantar</span>`:`<span class="ltag ck">${FASES_LABEL[l.fase_atual]||l.fase_atual}</span>`,
      l.embalagem_atual==='tubete'?`<span class="ltag az">🔲 Tubete</span>`:`<span class="ltag az">🪣 Saco</span>`,
      l.taxa_germinacao?`<span class="ltag verde">🌱 ${l.taxa_germinacao}%</span>`:'',
      l.dias_rustificando?`<span class="ltag am">☀️ ${l.dias_rustificando}d`:'',
      l.acoes_pendentes>0?`<span class="ltag am">📋 ${l.acoes_pendentes}</span>`:'',
    ].filter(Boolean).join('');
    const origemHtml=isVazio&&l.enchido_por_nome
      ?`<div class="lote-origem">🔗 ${l.enchido_por_nome}${l.nome_exibicao?.includes('Reuso')&&l.especie_nome?' · era '+l.especie_nome:''}</div>`:''

    return `<div class="lote-card ${stCss}" onclick="abrirLote(${l.id})">

        <div class="lote-body">

            </div>

          <div class="lote-tags">${tags}</div>
        </div>
      </div>
      ${origemHtml}${alertaHtml}
    </div>`;
  }).join('');
}

let _cameraCallback=null;
function abrirCamera(callback){
  _cameraCallback=callback;
  document.getElementById('inputCamera').click();
}
document.getElementById('inputCamera').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file||!_cameraCallback)return;
  const reader=new FileReader();
  reader.onload=ev=>{_cameraCallback(ev.target.result);};
  reader.readAsDataURL(file);
  this.value='';
});

// ── MODAL DETALHE ────────────────────────────────────────────
async function abrirLote(id){
  document.getElementById('modalLote').classList.add('vis');
  document.getElementById('modalLoteConteudo').innerHTML='<div class="loading" style="padding:40px">Carregando...</div>';
  try{
    const [rDetalhe, rTaxa] = await Promise.all([
      api('api_lotes.php',{acao:'detalhe',id}),
      api('api_lotes.php',{acao:'historico_taxa',lote_id:id}).catch(()=>({ok:false})),
    ]);
    if(!rDetalhe.ok) throw new Error(rDetalhe.erro);
    APP.loteAtual=rDetalhe.dados;
    APP.taxaData = rTaxa.ok ? rTaxa.dados : null;
    renderModalLote(rDetalhe.dados);
    const params=new URLSearchParams(location.search);
    if(params.get('aba')==='visitas') setTimeout(()=>{const t=document.querySelector('.mtab:nth-child(1)');if(t)mudarTab('visitas',t);},100);
  }catch(e){document.getElementById('modalLoteConteudo').innerHTML=`<div class="loading">Erro: ${e.message}</div>`;}
}

function mudarTab(id,el){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('vis'));
  el.classList.add('on');
  document.getElementById('tab-'+id)?.classList.add('vis');
}

function abrirAssociarEspecie(loteId,qtdMax){
  const opcoes=APP.especies.map(e=>`<option value="${e.id}">${e.nome_popular}</option>`).join('');
  document.getElementById('modalAcaoBox').innerHTML=`
    <div class="modal-handle"></div>
    <div class="acao-titulo">🌿 Plantar espécie</div>
    <div class="campo"><label>Espécie *</label><select id="assocEsp"><option value="">— selecione —</option>${opcoes}</select></div>
    <div class="campo"><label>Quantidade (máx ${qtdMax})</label><input type="number" id="assocQtd" min="1" max="${qtdMax}" value="${qtdMax}" inputmode="numeric"></div>
    <div class="campo"><label>Sementes por unidade</label><input type="number" id="assocSem" min="1" value="1" inputmode="numeric"></div>
    <div class="campo"><label>Data de semeadura</label><input type="date" id="assocData" value="${new Date().toISOString().slice(0,10)}"></div>
    <button class="btn-salvar" onclick="confirmarAssociar(${loteId})">Confirmar plantio</button>`;
  document.getElementById('modalAcao').classList.add('vis');
}

async function confirmarAssociar(loteId){
  const especie_id=parseInt(document.getElementById('assocEsp')?.value)||0;
  const quantidade=parseInt(document.getElementById('assocQtd')?.value)||0;
  const sementes=parseInt(document.getElementById('assocSem')?.value)||1;
  const data=document.getElementById('assocData')?.value;
  if(!especie_id){toast('Selecione a espécie');return;}
  if(!quantidade){toast('Informe a quantidade');return;}
  try{
    const r=await api('api_lotes.php',{acao:'associar_especie',lote_id:loteId,especie_id,quantidade,sementes_por_unidade:sementes,data_semeadura:data});
    if(!r.ok) throw new Error(r.erro);
    toast(`✓ ${r.dados.mensagem}`);
    fecharModal('modalAcao',{target:document.getElementById('modalAcao')});
    fecharModal('modalLote',{target:document.getElementById('modalLote')});
    await Promise.all([carregarLotes(),carregarDashboard()]);
  }catch(e){toast(e.message);}
}

function tirarFotoVisita(){
  abrirCamera(base64=>{
    APP.fotoAtual=base64;
    document.getElementById('btnCameraVisita').className='btn-camera com-foto';
    document.getElementById('btnCameraVisita').textContent='✓ Foto capturada';
    document.getElementById('fotoVisitaPreview').innerHTML=`<img class="foto-preview" src="${base64}" onclick="APP.fotoAtual=null;this.parentElement.innerHTML='';document.getElementById('btnCameraVisita').className='btn-camera';document.getElementById('btnCameraVisita').textContent='📷 Adicionar foto (opcional)'">`;
  });
}

function selecionarEstado(btn){
  document.querySelectorAll('.estado-btn').forEach(b=>{
    b.style.borderColor='var(--czl)';
    b.style.background='var(--ar)';
  });
  const isProblema = btn.dataset.estado==='problema';
  btn.style.borderColor = isProblema ? 'var(--al)' : 'var(--v4)';
  btn.style.background  = isProblema ? 'var(--alc)' : 'var(--vp)';
  APP.estadoVisita=btn.dataset.estado;
  document.getElementById('btnSalvarVisita').disabled=false;
}

async function salvarVisita(loteId){
  if(!APP.estadoVisita){toast('Selecione o estado');return;}
  const obs=document.getElementById('visitaObs')?.value?.trim()||null;
  // problema = sugere atenção automaticamente
  const sugere = APP.estadoVisita==='problema' ? 1 : 0;
  try{
    const r=await api('api_lotes.php',{acao:'registrar_visita',lote_id:loteId,estado_geral:APP.estadoVisita,observacao:obs,sugere_atencao:sugere,foto_base64:APP.fotoAtual});
    if(!r.ok) throw new Error(r.erro);
    APP.visitaAtual=r.dados.visita_id;
    toast('✓ Visita registrada');
    if(APP.estadoVisita==='problema'){
      // Vai direto para o formulário completo de ações

async function registrarAcaoVisita(visitaId,loteId,tipo){

  else if(tipo==='tarefa'){const titulo=document.getElementById('tarefaTitulo')?.value?.trim();if(!titulo){toast('Informe o título');return;}dados={...dados,tarefa_titulo:titulo,tarefa_prioridade:'normal'};}

// ── ENCERRAR SEMENTEIRA ───────────────────────────────────────
async function encerrarSementeira(loteId){
  const ok=confirm('🪴 Encerrar sementeira?\n\nEla voltará para estado vazio e estará disponível para novo uso.\n\nApenas gestores podem fazer isso.');
  if(!ok)return;
  try{
    const r=await api('api_lotes.php',{acao:'encerrar_sementeira',lote_id:loteId});
    if(!r.ok)throw new Error(r.erro);
    toast(r.dados.mensagem);
    fecharModal('modalLote',{target:document.getElementById('modalLote')});
    await Promise.all([carregarLotes(),carregarDashboard()]);
  }catch(e){toast(e.message);}
}

// ── GRÁFICO DA FICHA DO LOTE ──────────────────────────────────
function _renderGrafico(lote, taxaData){
  const W=320, H=160, PAD=28;

  // ── Linha do tempo das fases ──
  const FASES_ORD=['semeadura','germinacao','adaptacao','crescimento_tubete','crescimento_saco','rustificacao','expedicao'];
  const FASES_COR={'semeadura':'#4caf70','germinacao':'#d4a017','adaptacao':'#a855c8',
    'crescimento_tubete':'#2d6b45','crescimento_saco':'#2d6b45','rustificacao':'#c87c2a','expedicao':'#4090d0'};
  const FASES_LBL={'semeadura':'Semeado','germinacao':'Germ.','adaptacao':'Adapt.',
    'crescimento_tubete':'Crescendo','crescimento_saco':'Crescendo','rustificacao':'Rust.','expedicao':'Expedido'};

  // Monta linha do tempo a partir do histórico
  const hoje = new Date();
  const semeadoEm = lote.data_semeadura ? new Date(lote.data_semeadura) : null;
  const plantioEm = lote.data_plantio_atual ? new Date(lote.data_plantio_atual) : semeadoEm;
  const criadoEm  = new Date(lote.criado_em || hoje);

  const diasTotal = semeadoEm
    ? Math.max(1, Math.round((hoje - semeadoEm) / 86400000))
    : Math.max(1, Math.round((hoje - criadoEm) / 86400000));

  // SVG linha do tempo
  let svgTimeline = `<svg width="${W}" height="40" style="display:block;margin-bottom:8px">`;
  // Linha base
  svgTimeline += `<line x1="${PAD}" y1="20" x2="${W-PAD}" y2="20" stroke="#c8d8cc" stroke-width="2"/>`;

  // Pontos de fase
  const faseAtual = lote.fase_atual;
  const faseIdx = FASES_ORD.indexOf(faseAtual);
  const nFases = Math.max(faseIdx+1, 1);
  const step = (W - PAD*2) / Math.max(nFases, 1);

  FASES_ORD.slice(0, faseIdx+1).forEach((f, i) => {
    const x = PAD + i * step;
    const cor = FASES_COR[f] || '#c8d8cc';
    svgTimeline += `<circle cx="${x}" cy="20" r="5" fill="${cor}"/>`;
    svgTimeline += `<text x="${x}" y="36" text-anchor="middle" font-size="7" fill="#5a6860" font-family="DM Mono,monospace">${FASES_LBL[f]||f}</text>`;
  });
  svgTimeline += `</svg>`;

  // ── Curva de taxa (se houver dados) ──
  let svgCurva = '';
  if(taxaData?.registros?.length >= 2){
    const regs = taxaData.registros;
    const qtdMax = Math.max(...regs.map(r=>parseInt(r.qtd_vivas)||0), 1);
    const xScale = (W - PAD*2) / Math.max(regs.length - 1, 1);
    const yScale = (H - PAD*2) / qtdMax;

    const pontos = regs.map((r,i) => {
      const x = PAD + i * xScale;
      const y = H - PAD - (parseInt(r.qtd_vivas)||0) * yScale;
      return `${x},${y}`;
    }).join(' ');

    const area = `${PAD},${H-PAD} ` + pontos + ` ${PAD + (regs.length-1)*xScale},${H-PAD}`;

    svgCurva = `<svg width="${W}" height="${H}" style="display:block">
      <!-- Fundo gradiente -->
      <defs><linearGradient id="taxaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4caf70" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#4caf70" stop-opacity="0.02"/>
      </linearGradient></defs>
      <!-- Área -->
      <polygon points="${area}" fill="url(#taxaGrad)"/>
      <!-- Linha -->
      <polyline points="${pontos}" fill="none" stroke="#4caf70" stroke-width="2"/>
      <!-- Pontos -->
      ${regs.map((r,i)=>{
        const x=PAD+i*xScale;
        const y=H-PAD-(parseInt(r.qtd_vivas)||0)*yScale;
        const cor=r.qtd_perdidas>0?'#b03020':'#4caf70';
        return `<circle cx="${x}" cy="${y}" r="4" fill="${cor}"/>
          <text x="${x}" y="${H-PAD+10}" text-anchor="middle" font-size="7" fill="#5a6860" font-family="DM Mono,monospace">${r.dia_taxa??i}d</text>`;
      }).join('')}
      <!-- Eixo Y -->
      <text x="${PAD-2}" y="${PAD}" text-anchor="end" font-size="7" fill="#5a6860" font-family="DM Mono,monospace">${qtdMax}</text>
      <text x="${PAD-2}" y="${H-PAD}" text-anchor="end" font-size="7" fill="#5a6860" font-family="DM Mono,monospace">0</text>
    </svg>`;
  }

  const temDados = taxaData?.registros?.length >= 2;
  const semDados = !temDados
    ? `<div style="text-align:center;padding:16px;color:var(--cz);font-family:'DM Mono',monospace;font-size:10px">
        ${['germinacao','adaptacao'].includes(lote.fase_atual)
          ? 'Registre pelo menos 2 medições para ver o gráfico de taxa.'
          : 'Processo de taxa não iniciado ou encerrado.'}
      </div>` : '';

  const inicioStr = semeadoEm
    ? `Semeado ${Math.round((hoje-semeadoEm)/86400000)} dias atrás`
    : `Lote criado há ${Math.round((hoje-criadoEm)/86400000)} dias`;

  return `<div style="padding:10px 0">
    <div style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--cz);margin-bottom:6px">${inicioStr}</div>
    ${svgTimeline}
    ${temDados
      ? `<div style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--cz);margin:10px 0 4px">Taxa de germinação/adaptação</div>
         <div style="font-size:11px;color:var(--cz);margin-bottom:6px">${taxaData.registros.length} registros · inicial: ${taxaData.taxa_info?.taxa_qtd_inicial||'—'} · atual: ${taxaData.taxa_info?.taxa_qtd_atual||'—'}</div>
         ${svgCurva}`
      : semDados}
  </div>`;
}

async function api(arq,dados){
  const token=localStorage.getItem('vf_token');
  const r=await fetch(`../api/${arq}`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json',...(token?{'X-VF-TOKEN':token}:{})},body:JSON.stringify(dados)});
  if(r.status===401){window.location.href='app_login.html';}
  return r.json();
}
function logout(){api('api_auth.php',{acao:'logout'}).catch(()=>{});localStorage.clear();window.location.href='app_login.html';}
let _tt;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('vis');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('vis'),2800);}

async function navegar(destino){
  try{
    const token=localStorage.getItem('vf_token');
    const r=await fetch('../api/api_ponto.php',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json',...(token?{'X-VF-TOKEN':token}:{})},body:JSON.stringify({acao:'hoje'})});
    const d=await r.json();
    if(d.ok && d.dados.tem_entrada_aberta){
      window.location.href=destino;
    } else {
      const t=document.getElementById('toast');
      if(t){t.textContent='🔒 Registre o ponto primeiro';t.classList.add('vis');setTimeout(()=>t.classList.remove('vis'),2800);}
      else alert('Registre o ponto primeiro');
    }
  }catch(e){ window.location.href='app_ponto.html'; }
}
